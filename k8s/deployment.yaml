apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-bot
  template:
    metadata:
      labels:
        app: weather-bot
    spec:
      imagePullSecrets:
      - name: gitlab-registry
      containers:
      - name: bot
        image: 192.168.0.199:5050/root/devops:latest
        imagePullPolicy: Always
        env:
        - name: TELEGRAM_TOKEN
          valueFrom:
            secretKeyRef:
              name: weather-bot-secret
              key: TELEGRAM_TOKEN
        - name: WEATHER_API_KEY
          valueFrom:
            secretKeyRef:
              name: weather-bot-secret
              key: WEATHER_API_KEY
        - name: HTTP_PROXY
          value: "socks5://localhost:1080"
        - name: HTTPS_PROXY
          value: "socks5://localhost:1080"
        ports:
        - containerPort: 8080
      - name: hysteria
        image: tobyxdd/hysteria:latest
        command: ["hysteria"]
        args:
          - client
          - -c
          - /etc/hysteria/config.json
        ports:
        - containerPort: 1080
          protocol: TCP
        volumeMounts:
        - name: hysteria-config
          mountPath: /etc/hysteria
        env:
        - name: HYSTERIA_LOG_LEVEL
          value: "info"
      volumes:
      - name: hysteria-config
        configMap:
          name: hysteria-config