apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-bot
  namespace: weather-bot
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: weather-bot
  template:
    metadata:
      labels:
        app: weather-bot
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: bot
        image: 192.168.181.134:30500/weather-bot:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        - containerPort: 9090
          name: metrics
        env:
        - name: TELEGRAM_TOKEN
          valueFrom:
            secretKeyRef:
              name: weather-bot-secret
              key: TELEGRAM_TOKEN
        - name: WEATHER_API_KEY
          valueFrom:
            secretKeyRef:
              name: weather-bot-secret
              key: WEATHER_API_KEY
        - name: HTTP_PROXY
          value: "socks5://localhost:1080"
        - name: HTTPS_PROXY
          value: "socks5://localhost:1080"
      - name: hysteria
        image: tobyxdd/hysteria:latest
        command: ["hysteria"]
        args:
          - client
          - -c
          - /etc/hysteria/config.json
        ports:
        - containerPort: 1080
          protocol: TCP
        volumeMounts:
        - name: hysteria-config
          mountPath: /etc/hysteria
        env:
        - name: HYSTERIA_LOG_LEVEL
          value: "info"
      volumes:
      - name: hysteria-config
        configMap:
          name: hysteria-config
