apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: weather-bot
  namespace: weather-bot
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app: weather-bot
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
  namespaceSelector:
    matchNames:
    - weather-bot
