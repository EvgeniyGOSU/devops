name: Build and Deploy Weather Bot

on:
  push:
    branches:
      - main
      - test

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: catthehacker/ubuntu:act-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubeconfig
        run: |
          mkdir -p /root/.kube
          echo "${{ secrets.KUBECONFIG }}" > /root/.kube/config

      - name: Build Docker image
        run: |
          docker build -t weather-bot:latest .

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/secret.yaml -n weather-bot
          kubectl apply -f k8s/configmap.yaml -n weather-bot
          kubectl apply -f k8s/deployment.yaml -n weather-bot
          kubectl apply -f k8s/service.yaml -n weather-bot
          kubectl rollout restart deployment/weather-bot -n weather-bot
          kubectl rollout status deployment/weather-bot -n weather-bot
