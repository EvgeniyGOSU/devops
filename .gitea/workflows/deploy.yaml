name: Build and Deploy Weather Bot

on:
  push:
    branches:
      - main
      - test

jobs:
  deploy:
    runs-on: kubernetes
    steps:
      - name: Setup Git SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GITEA_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 30022 192.168.181.134 >> ~/.ssh/known_hosts

      - name: Checkout code
        run: |
          git clone ssh://git@192.168.181.134:30022/gosu/devops.git .
          git checkout ${{ gitea.ref_name }}

      - name: Build Docker image
        run: |
          docker build -t weather-bot:latest .

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout restart deployment/weather-bot -n default
          kubectl rollout status deployment/weather-bot -n default
