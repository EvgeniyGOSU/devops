apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-bot
  template:
    metadata:
      labels:
        app: weather-bot
    spec:
      imagePullSecrets:
      - name: gitlab-registry
      containers:
      - name: bot
        image: 192.168.0.199:5050/root/devops:latest
        imagePullPolicy: Always
        env:
        - name: TELEGRAM_TOKEN
          valueFrom:
            secretKeyRef:
              name: weather-bot-secret
              key: TELEGRAM_TOKEN
        - name: WEATHER_API_KEY
          valueFrom:
            secretKeyRef:
              name: weather-bot-secret
              key: WEATHER_API_KEY
        - name: HTTP_PROXY
          value: "http://hiddify-client-service:12334"
        - name: HTTPS_PROXY
          value: "http://hiddify-client-service:12334"
        ports:
        - containerPort: 8080